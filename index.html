<html>
    <head>
        <meta property="og:title" content="Soon™">
        <title>fchb1239 is lazy</title>
    </head>
    <body>
        <h1>fchb1239 is lazy</h1>
        <h2>Days since last Gorilla World update:</h2>
        <h3 id="gwTimer">...</h3>
        <h2>Days since last Gorilla Royale update:</h2>
        <h3 id="grTimer">...</h3>
        <h2>Days since last Fish Game update:</h2>
        <h3 id="fgTimer">...</h3>
        <button id="refreshButton">Refresh</button>
    </body>
    <script>
        updateTimeSince("2025-7-3", "gwTimer")
        updateTimeSince("2025-7-5", "grTimer")
        updateTimeSince("2025-5-28", "fgTimer")
    const refreshButton = document.getElementById('refreshButton');
    refreshButton.addEventListener('click', () => {
        updateTimeSince("2025-7-3", "gwTimer")
        updateTimeSince("2025-7-5", "grTimer")
        updateTimeSince("2025-5-28", "fgTimer")
    });
    function updateTimeSince(pastDate, game) {
    const now = new Date();
    const past = new Date(pastDate);
    const diffInMs = now - past;
    const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
    document.getElementById(game).innerText = diffInDays + " days ago";
  }
</script>
</html>
