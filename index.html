<html>
    <head>
        <title>fchb1239 is lazy</title>
        <meta property="og:title" content="Soon™">
        <meta property="og:description" content="fchb1239 is lazy">
        <link rel="shortcut icon" href="fchbislazy.ico">
        <link rel="icon" type="image/png" href="fchbislazy.ico">
        <meta property="og:image" content="fchbislazy.ico">
    </head>
    <body>
    <div id="particles-js">
    <canvas class="particles-js-canvas-el" style="width: 100%; height: 100%; display: block;" width="1657" height="438"></canvas>
    </div>
        <center>
        <h1 style="position: absolute;">fchb1239 is lazy</h1>
        <h2>Days since last Gorilla World update:</h2>
        <h3 id="gwTimer">...</h3>
        <h2>Days since last Gorilla Royale update:</h2>
        <h3 id="grTimer">...</h3>
        <h2>Days since last Fish Game update:</h2>
        <h3 id="fgTimer">...</h3>
        <button id="refreshButton">Refresh</button>
        </center>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
            particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 }},
                "color": { "value": "#000000" },
                "shape": { "type": "circle", "stroke": { "width": 0, "color": "#000" }},
                "opacity": { "value": 0.5 },
                "size": { "value": 5, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#000000", "opacity": 0.5, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            },
            "interactivity": {
                "events": {
                "onhover": { "enable": true, "mode": "repulse" },
                "onclick": { "enable": true, "mode": "push" }
                },
                "modes": {
                "repulse": { "distance": 200 },
                "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
            });
        </script>
        </body>
        <script>
        updateTimeSince("2025-7-3", "gwTimer")
        updateTimeSince("2025-7-5", "grTimer")
        updateTimeSince("2025-5-28", "fgTimer")
    const refreshButton = document.getElementById('refreshButton');
    refreshButton.addEventListener('click', () => {
        updateTimeSince("2025-7-3", "gwTimer")
        updateTimeSince("2025-7-5", "grTimer")
        updateTimeSince("2025-3-28", "fgTimer")
    });
    function updateTimeSince(pastDate, game) {
    const now = new Date();
    const past = new Date(pastDate);
    const diffInMs = now - past;
    const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
    document.getElementById(game).innerText = diffInDays + " days ago";
  }
</script>
</html>
